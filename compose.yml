services:
  sqlserver:
    build: .
    container_name: sqlserver-db
    restart: always
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "YourStrong@Password123"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
      - ./initDB:/initDB
      - ./init.sh:/init.sh
    command: /bin/bash /init.sh

  mongodb:
    image: mongo:7
    container_name: mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

volumes:
  sqlserver_data:
  mongodb_data: