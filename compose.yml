services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver-db
    restart: always
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "YourStrong@Password123"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql

  redis:
    image: redis:7-alpine
    container_name: redisXClone
    ports:
      - "6380:6379"
    environment:
      REDIS_PASSWORD: "cambia_esto_por_una_password_segura"
    command:
      - sh
      - -c
      - |
        redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD"
    volumes:
      - redis_data:/data
    restart: unless-stopped

    
  redisinsight:
    image: redis/redisinsight:latest
    container_name: redisinsightXClone
    ports:
      - "5540:5540"
    volumes:
      - redisinsight_data:/data
    restart: unless-stopped
    depends_on:
      - redis
  
  mongodb:
    image: mongo:7
    container_name: mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

volumes:
  sqlserver_data:
  mongodb_data:
  redis_data:
  redisinsight_data: